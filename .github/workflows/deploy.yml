name: Deploy LuaMadePackages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_FUNCTIONAPP_NAME: luamadepkgs-${{ github.event.inputs.environment || 'dev' }}-func
  AZURE_RESOURCE_GROUP: luamadepkgs-${{ github.event.inputs.environment || 'dev' }}-rg
  NODE_VERSION: '18.x'

jobs:
  # ---------------------------------------------------------------------------
  # Test – run unit tests before deploying
  # ---------------------------------------------------------------------------
  test:
    name: Test API
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Deploy infrastructure (Bicep)
  # ---------------------------------------------------------------------------
  deploy-infra:
    name: Deploy Azure Infrastructure
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      functionAppHostname: ${{ steps.bicep.outputs.functionAppHostname }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group if not exists
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az group create \
              --name "${{ env.AZURE_RESOURCE_GROUP }}" \
              --location eastus \
              --output none

      - name: Deploy Bicep template
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment || 'dev' }}
            apiKeyHash=${{ secrets.API_KEY_HASH }}
          failOnStdErr: false

  # ---------------------------------------------------------------------------
  # Deploy Function App code
  # ---------------------------------------------------------------------------
  deploy-app:
    name: Deploy Function App
    runs-on: ubuntu-latest
    needs: deploy-infra
    permissions:
      contents: read
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: api
          respect-funcignore: true
